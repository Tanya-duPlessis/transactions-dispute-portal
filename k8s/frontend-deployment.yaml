apiVersion: apps/v1
kind: Deployment
metadata:
  name: resolve-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resolve-frontend
  template:
    metadata:
      labels:
        app: resolve-frontend
    spec:
      containers:
        - name: resolve-frontend
          image: your-registry/resolve-frontend:latest
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
---
apiVersion: v1
kind: Service
metadata:
  name: resolve-frontend
spec:
  selector:
    app: resolve-frontend
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer
